<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNT Vote — Cardano Native Token Voting</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://esm.sh; connect-src 'self'">
<link rel="icon" href="/img/cardano-starburst.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<header>
  <div class="logo"><span>CNT</span> Vote</div>
  <nav>
    <button class="btn btn-sm btn-ghost" id="themeBtn">☀</button>
    <button class="btn btn-sm" id="createBtn" style="display:none">+ Propose</button>
    <div id="walletArea">
      <button class="btn btn-sm btn-primary" id="connectBtn">Connect Wallet</button>
    </div>
  </nav>
</header>

<main class="container">
  <div class="tabs">
    <button class="tab tab-active" data-view="proposals">Proposals</button>
    <button class="tab" data-view="portfolio">Portfolio <span class="badge badge-beta">Beta</span></button>
  </div>
  <div id="mainView">
    <div class="mini-cards" id="miniCards"></div>
    <div class="section-title">
      Active Proposals
      <span class="badge" id="proposalCount">0</span>
    </div>
    <div id="tokenFilter"></div>
    <div id="proposalList"></div>
  </div>
  <div id="portfolioView" style="display:none">
    <div class="section-title">Portfolio</div>
    <div id="portfolioContent"></div>
  </div>
</main>

<div class="modal-overlay" id="walletModal">
  <div class="modal">
    <button class="btn btn-sm btn-ghost modal-close" data-close="walletModal">&times;</button>
    <h2>Connect Wallet</h2>
    <div class="wallet-list" id="walletList"></div>
    <p class="tooltip">Make sure your Cardano wallet extension is installed and unlocked.</p>
  </div>
</div>

<div class="modal-overlay" id="createModal">
  <div class="modal">
    <button class="btn btn-sm btn-ghost modal-close" data-close="createModal">&times;</button>
    <h2>Create Proposal</h2>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="propTitle" placeholder="e.g. Fund the Catalyst proposal">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="propDesc" placeholder="Describe your proposal..."></textarea>
    </div>
    <div class="form-group">
      <label>Token <span class="tooltip">(select a curated token or choose Custom)</span></label>
      <select id="propTokenSelect">
        <option value="">ADA</option>
        <option value="custom">— Custom token —</option>
      </select>
    </div>
    <div class="form-group" id="propCustomGroup" style="display:none">
      <label>Policy ID <span class="tooltip">(64-char hex)</span></label>
      <input type="text" id="propPolicy" placeholder="64-char hex policy ID">
    </div>
    <div class="form-group" id="propAssetGroup" style="display:none">
      <label>Asset Name (hex)</label>
      <input type="text" id="propAsset" placeholder="Leave empty for default policy token">
    </div>
    <button class="btn btn-primary" id="createSubmitBtn" style="width:100%">Create Proposal</button>
  </div>
</div>

<div class="modal-overlay" id="voteModal">
  <div class="modal">
    <button class="btn btn-sm btn-ghost modal-close" data-close="voteModal">&times;</button>
    <h2 id="voteModalTitle">Cast Your Vote</h2>
    <p class="tooltip" id="voteTokenInfo" style="margin-bottom:0.75rem"></p>
    <div class="token-selector" id="voteTokenSelector"></div>
    <div class="vote-options" id="voteOptions"></div>
    <button class="btn btn-primary" id="voteSubmitBtn" style="width:100%">Sign & Submit Vote</button>
  </div>
</div>

<div class="modal-overlay" id="auditModal">
  <div class="modal" style="max-width:640px">
    <button class="btn btn-sm btn-ghost modal-close" data-close="auditModal">&times;</button>
    <h2>Audit Trail</h2>
    <p class="tooltip" id="auditInfo" style="margin-bottom:0.75rem"></p>
    <div class="table-wrap" id="auditTableWrap"></div>
    <div style="margin-top:0.75rem;display:flex;gap:0.5rem">
      <button class="btn btn-sm" id="copyAuditBtn">Copy JSON</button>
      <a class="btn btn-sm" id="downloadAuditBtn" target="_blank">Download</a>
    </div>
  </div>
</div>

<footer class="footer">
  <a href="https://github.com/kvnhndrsn/CaNT-vote" target="_blank" rel="noopener" class="footer-link"><svg role="img" viewBox="0 0 24 24" class="footer-icon" xmlns="http://www.w3.org/2000/svg"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg> GitHub</a>
  <span class="footer-text">2026 open sourced under the MIT license.</span>
</footer>

<div class="toast" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "bech32": "https://esm.sh/bech32@2.0.0"
  }
}
</script>
<script type="module" src="/app.js"></script>
</body>
</html>
